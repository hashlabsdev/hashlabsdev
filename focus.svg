<svg width="900" height="170" viewBox="0 0 900 170" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="170" fill="#0f1219" rx="14" stroke="#6c63ff" stroke-width="0.8" stroke-opacity="0.3"/>
  <rect x="0" y="0" width="4" height="170" fill="url(#accentBar)" rx="2" filter="url(#glow2)"/>

  <!-- BG glow -->
  <circle cx="840" cy="50" r="70" fill="#6c63ff" opacity="0">
    <animate attributeName="opacity" values="0;0.07;0.04;0.08;0" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- Title row -->
  <text x="28" y="44" font-size="20" font-family="sans-serif">🚀</text>
  <text x="56" y="46" font-family="'Segoe UI',Arial,sans-serif" font-size="19" font-weight="700" fill="#ffffff">
    Pharmacy POS System
    <animate attributeName="opacity" values="0;1" dur="0.6s" fill="freeze"/>
  </text>

  <!-- Stack line -->
  <text x="28" y="72" font-family="monospace" font-size="11.5" fill="#6c63ff" opacity="0">
    Laravel · Next.js · PostgreSQL
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.4s" fill="freeze"/>
  </text>
  <text x="230" y="72" font-family="monospace" font-size="11.5" fill="#475569" opacity="0">
     — Production-grade, not a prototype.
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.6s" fill="freeze"/>
  </text>

  <line x1="28" y1="84" x2="872" y2="84" stroke="#1e2330" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.8s" fill="freeze"/>
  </line>

  <!-- Col 1 features -->
  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.0s" fill="freeze"/>
    <circle cx="40" cy="106" r="3.5" fill="#6c63ff" filter="url(#glow2)">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <text x="54" y="111" font-family="'Segoe UI',Arial,sans-serif" font-size="12.5" fill="#94a3b8">Inventory &amp; stock expiry tracking</text>
  </g>

  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.2s" fill="freeze"/>
    <circle cx="40" cy="128" r="3.5" fill="#6c63ff" filter="url(#glow2)">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <text x="54" y="133" font-family="'Segoe UI',Arial,sans-serif" font-size="12.5" fill="#94a3b8">Supplier &amp; purchase order management</text>
  </g>

  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.4s" fill="freeze"/>
    <circle cx="40" cy="150" r="3.5" fill="#6c63ff" filter="url(#glow2)">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <text x="54" y="155" font-family="'Segoe UI',Arial,sans-serif" font-size="12.5" fill="#94a3b8">Customer profiles &amp; purchase history</text>
  </g>

  <!-- Col 2 features -->
  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.6s" fill="freeze"/>
    <circle cx="468" cy="106" r="3.5" fill="#00d4ff" filter="url(#glow2)">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" begin="0.2s" repeatCount="indefinite"/>
    </circle>
    <text x="482" y="111" font-family="'Segoe UI',Arial,sans-serif" font-size="12.5" fill="#94a3b8">Billing, invoicing &amp; receipt printing</text>
  </g>

  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.8s" fill="freeze"/>
    <circle cx="468" cy="128" r="3.5" fill="#00d4ff" filter="url(#glow2)">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <text x="482" y="133" font-family="'Segoe UI',Arial,sans-serif" font-size="12.5" fill="#94a3b8">Sales analytics &amp; reporting dashboard</text>
  </g>

  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" begin="2.0s" fill="freeze"/>
    <circle cx="468" cy="150" r="3.5" fill="#00d4ff" filter="url(#glow2)">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" begin="1.0s" repeatCount="indefinite"/>
    </circle>
    <text x="482" y="155" font-family="'Segoe UI',Arial,sans-serif" font-size="12.5" fill="#94a3b8">Role-based access control</text>
  </g>
</svg>
