<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0f1a"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6c63ff" stop-opacity="0"/>
      <stop offset="30%" stop-color="#6c63ff" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#00d4ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- BG -->
  <rect width="900" height="220" fill="url(#bg)" rx="0"/>

  <!-- Grid -->
  <g opacity="0.07" stroke="#6c63ff" stroke-width="0.5">
    <line x1="0" y1="44" x2="900" y2="44"/>
    <line x1="0" y1="88" x2="900" y2="88"/>
    <line x1="0" y1="132" x2="900" y2="132"/>
    <line x1="0" y1="176" x2="900" y2="176"/>
    <line x1="150" y1="0" x2="150" y2="220"/>
    <line x1="300" y1="0" x2="300" y2="220"/>
    <line x1="450" y1="0" x2="450" y2="220"/>
    <line x1="600" y1="0" x2="600" y2="220"/>
    <line x1="750" y1="0" x2="750" y2="220"/>
  </g>

  <!-- Pulsing orbs -->
  <circle cx="120" cy="110" r="90" fill="#6c63ff" opacity="0">
    <animate attributeName="opacity" values="0;0.08;0.04;0.09;0" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="r" values="90;110;90" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="780" cy="110" r="80" fill="#00d4ff" opacity="0">
    <animate attributeName="opacity" values="0;0.06;0.03;0.07;0" dur="7s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="r" values="80;100;80" dur="7s" begin="1s" repeatCount="indefinite"/>
  </circle>

  <!-- Hash badge -->
  <rect x="0" y="0" width="900" height="220" fill="transparent"/>
  <rect x="32" y="85" width="52" height="52" rx="14" fill="#6c63ff">
    <animate attributeName="opacity" values="0;1" dur="0.6s" fill="freeze"/>
  </rect>
  <text x="58" y="119" font-family="monospace" font-size="26" font-weight="800" fill="white" text-anchor="middle">
    #
    <animate attributeName="opacity" values="0;1" dur="0.6s" fill="freeze"/>
  </text>

  <!-- Main title with typewriter feel -->
  <text x="450" y="98" font-family="'Segoe UI',Arial,sans-serif" font-size="52" font-weight="800"
        fill="url(#titleGrad)" text-anchor="middle" filter="url(#glow)">
    Hash Labs
    <animate attributeName="opacity" values="0;0;1" dur="1s" keyTimes="0;0.3;1" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="0,20;0,0" dur="1s" fill="freeze"/>
  </text>

  <!-- Subtitle -->
  <text x="450" y="130" font-family="monospace" font-size="11" fill="#7c6aff"
        text-anchor="middle" letter-spacing="5">
    ENGINEERING DIGITAL PRODUCTS THAT MATTER
    <animate attributeName="opacity" values="0;0;1" dur="1.4s" keyTimes="0;0.5;1" fill="freeze"/>
  </text>

  <!-- Animated separator line -->
  <line x1="160" y1="152" x2="740" y2="152" stroke="url(#lineGrad)" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;1" begin="1s" dur="0.8s" fill="freeze"/>
  </line>

  <!-- Moving particle on line -->
  <circle r="3.5" fill="#ffffff" filter="url(#softglow)" opacity="0">
    <animate attributeName="opacity" values="0;1" begin="1.8s" dur="0.3s" fill="freeze"/>
    <animateMotion begin="1.8s" dur="3s" repeatCount="indefinite"
      path="M160,152 C300,152 600,152 740,152"/>
  </circle>
  <circle r="1.5" fill="#00d4ff" opacity="0">
    <animate attributeName="opacity" values="0;0.6" begin="2.2s" dur="0.3s" fill="freeze"/>
    <animateMotion begin="2.2s" dur="3s" repeatCount="indefinite"
      path="M160,152 C300,152 600,152 740,152"/>
  </circle>

  <!-- Social pills -->
  <rect x="300" y="168" width="136" height="32" rx="16" fill="#1a0a20" stroke="#e4405f" stroke-width="0.8" opacity="0">
    <animate attributeName="opacity" values="0;1" begin="1.6s" dur="0.5s" fill="freeze"/>
  </rect>
  <circle cx="321" cy="184" r="5" fill="#e4405f" opacity="0">
    <animate attributeName="opacity" values="0;1" begin="1.6s" dur="0.5s" fill="freeze"/>
  </circle>
  <text x="334" y="189" font-family="monospace" font-size="11.5" fill="#e4405f" opacity="0">
    @hashc_oding
    <animate attributeName="opacity" values="0;1" begin="1.6s" dur="0.5s" fill="freeze"/>
  </text>

  <rect x="464" y="168" width="138" height="32" rx="16" fill="#0a1020" stroke="#3b82f6" stroke-width="0.8" opacity="0">
    <animate attributeName="opacity" values="0;1" begin="1.9s" dur="0.5s" fill="freeze"/>
  </rect>
  <circle cx="485" cy="184" r="5" fill="#3b82f6" opacity="0">
    <animate attributeName="opacity" values="0;1" begin="1.9s" dur="0.5s" fill="freeze"/>
  </circle>
  <text x="498" y="189" font-family="monospace" font-size="11.5" fill="#3b82f6" opacity="0">
    Hash Company
    <animate attributeName="opacity" values="0;1" begin="1.9s" dur="0.5s" fill="freeze"/>
  </text>

  <!-- Corner dots -->
  <circle cx="876" cy="16" r="3" fill="#6c63ff">
    <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="864" cy="16" r="2" fill="#6c63ff">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="854" cy="16" r="1.5" fill="#6c63ff">
    <animate attributeName="opacity" values="0.3;0.05;0.3" dur="2s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="24" cy="204" r="2" fill="#00d4ff">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="876" cy="204" r="2" fill="#00d4ff">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>
